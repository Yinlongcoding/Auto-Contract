name: Release Windows App

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v1.0.1"
        required: true
        default: "v1.0.1"
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build and publish Tauri release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          releaseName: "Auto Contract ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          releaseBody: |
            ## Full Changelog

            ### Document generation
            - Added an export type chooser for each document so users can export Contract, PI, PL, and CI as either Excel or PDF.
            - Added editable gross weight per drum with a default of net weight plus 18 KG.
            - Applied thousands separators to exported monetary values and PL/CI total net and gross weight values.
            - Ensured empty buyer contact person values are rendered as `***` in PL/CI output.
            - Removed the extra `E-mail:` prefix from PI buyer email template values.

            ### Master data
            - Added trade account Tel and account description fields.
            - Switched trade account selection and listing to use account description.
            - Added product description fields and switched product selection/listing to use product description.
            - Removed CAS from product create, edit, detail, and list views.
            - Added the integrated manufacturer-trader customer type option.

            ### Fixes
            - Fixed deletion of term configuration schemes when one of their terms had already been removed from the term library.

            ### Validation
            - Verified with `npm run build`.
            - Verified with `cargo check`.
          releaseDraft: false
          prerelease: false
          releaseCommitish: ${{ github.sha }}
          generateReleaseNotes: true
          retryAttempts: 3
          uploadUpdaterJson: true
          uploadUpdaterSignatures: true
          updaterJsonPreferNsis: true
